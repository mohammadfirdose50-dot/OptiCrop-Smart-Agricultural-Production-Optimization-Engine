<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - OptiCrop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-brand">
                    <span class="logo-icon">🌾</span>
                    <span class="brand-name">OptiCrop</span>
                </div>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/findcrop">Crop Recommendation</a></li>
                </ul>
                <div class="nav-right">
                    <span class="ai-badge">🤖 AI Assistant</span>
                </div>
            </div>
        </nav>

        <section class="error-section">
            <div class="error-icon">⚠️</div>
            <h1>Oops! Something went wrong</h1>
            <p class="error-message">{{ error }}</p>
            <div class="error-actions">
                <a href="/findcrop" class="btn-primary">🔄 Try Again</a>
                <a href="/" class="btn-secondary">🏠 Home</a>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="logo-icon">🌾</span>
                    <span class="brand-name">OptiCrop</span>
                    <p>Smart Agricultural Production Optimization Engine</p>
                </div>
                <div class="footer-links">
                    <a href="/">Home</a>
                    <a href="/about">About</a>
                    <a href="/findcrop">Crop Recommendation</a>
                </div>
                <div class="footer-copy">
                    <p>&copy; 2024 OptiCrop. All rights reserved.</p>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
